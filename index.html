<title>Acerto de Viagem</title>
<style>
  :root {
    --primary: #1a6b5a;
    --primary-light: #e8f5f1;
    --primary-dark: #0f4a3d;
    --accent: #f0a500;
    --accent-light: #fff8e6;
    --danger: #c0392b;
    --danger-light: #fdf0ee;
    --bg: #f4f6f5;
    --surface: #ffffff;
    --surface2: #f9fafb;
    --border: #dde3e0;
    --text: #1c2b27;
    --text2: #4a6b60;
    --text3: #7a9e93;
    --radius: 10px;
    --radius-lg: 16px;
    --shadow: 0 2px 8px rgba(26,107,90,0.08);
    --shadow-lg: 0 8px 32px rgba(26,107,90,0.12);
    --font: 'Segoe UI', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ─── SHELL ─── */
  #app { display: flex; flex-direction: column; min-height: 100vh; }

  header {
    background: var(--primary);
    color: #fff;
    padding: 0 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.18);
  }
  .header-brand { display: flex; align-items: center; gap: 10px; }
  .header-brand .logo { font-size: 22px; }
  .header-brand span { font-size: 17px; font-weight: 600; letter-spacing: .3px; }
  .header-menu-btn { background: none; border: none; color: #fff; font-size: 22px; cursor: pointer; display: none; padding: 4px; }

  nav#sidebar {
    width: 220px; min-width: 220px;
    background: var(--primary-dark);
    padding: 16px 0;
    display: flex; flex-direction: column; gap: 2px;
    position: fixed; left: 0; top: 56px; bottom: 0; z-index: 90;
    overflow-y: auto;
    transition: transform .25s;
  }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 20px;
    color: rgba(255,255,255,.75);
    cursor: pointer;
    font-size: 14px;
    border-left: 3px solid transparent;
    transition: all .15s;
    user-select: none;
  }
  .nav-item:hover { background: rgba(255,255,255,.07); color: #fff; }
  .nav-item.active { background: rgba(255,255,255,.12); color: #fff; border-left-color: var(--accent); font-weight: 600; }
  .nav-item .icon { font-size: 18px; width: 22px; text-align: center; }
  .nav-section { font-size: 10px; font-weight: 700; color: rgba(255,255,255,.35); padding: 14px 20px 4px; letter-spacing: 1.2px; text-transform: uppercase; }

  main { margin-left: 220px; flex: 1; padding: 28px 24px; transition: margin .25s; }

  /* ─── PAGE HEADER ─── */
  .page-header { margin-bottom: 24px; }
  .page-header h1 { font-size: 22px; font-weight: 700; color: var(--text); }
  .page-header p { font-size: 14px; color: var(--text2); margin-top: 3px; }

  /* ─── CARDS ─── */
  .card {
    background: var(--surface);
    border-radius: var(--radius-lg);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    padding: 20px 22px;
    margin-bottom: 18px;
  }
  .card-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

  /* ─── FORM ─── */
  .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group label { font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; }
  .form-group input, .form-group select, .form-group textarea {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 9px 12px;
    font-size: 14px;
    color: var(--text);
    font-family: var(--font);
    transition: border-color .15s, box-shadow .15s;
    width: 100%;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(26,107,90,.1);
  }
  .form-group textarea { resize: vertical; min-height: 70px; }
  .form-actions { display: flex; gap: 10px; margin-top: 6px; flex-wrap: wrap; }

  /* ─── BUTTONS ─── */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 9px 18px; border-radius: var(--radius);
    font-size: 14px; font-weight: 600; cursor: pointer;
    border: none; transition: all .15s; white-space: nowrap;
  }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-accent { background: var(--accent); color: #fff; }
  .btn-accent:hover { background: #d4920a; }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:hover { background: #a93226; }
  .btn-outline { background: transparent; color: var(--primary); border: 1px solid var(--primary); }
  .btn-outline:hover { background: var(--primary-light); }
  .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--bg); }
  .btn-sm { padding: 5px 12px; font-size: 12px; border-radius: 7px; }
  .btn-icon { padding: 6px 8px; }

  /* ─── TABLE ─── */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    background: var(--surface2); padding: 10px 12px;
    text-align: left; font-size: 11px; font-weight: 700;
    color: var(--text2); text-transform: uppercase; letter-spacing: .6px;
    border-bottom: 2px solid var(--border);
    white-space: nowrap;
  }
  tbody tr { border-bottom: 1px solid var(--border); }
  tbody tr:hover { background: var(--primary-light); }
  tbody td { padding: 10px 12px; color: var(--text); vertical-align: middle; }
  .td-actions { display: flex; gap: 6px; justify-content: flex-end; }

  /* ─── BADGE ─── */
  .badge {
    display: inline-block; padding: 3px 10px; border-radius: 20px;
    font-size: 11px; font-weight: 700; letter-spacing: .3px;
  }
  .badge-dinheiro { background: #e8f5e9; color: #2e7d32; }
  .badge-cartao { background: #e3f2fd; color: #1565c0; }
  .badge-reembolso { background: #fff8e1; color: #e65100; }
  .badge-pago { background: #e8f5e9; color: #2e7d32; }
  .badge-pendente { background: #fff3e0; color: #e65100; }
  .badge-parcial { background: #fce4ec; color: #880e4f; }

  /* ─── STATS ─── */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 20px; }
  .stat-card { background: var(--surface); border-radius: var(--radius-lg); border: 1px solid var(--border); padding: 16px 18px; }
  .stat-label { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 6px; }
  .stat-value { font-size: 22px; font-weight: 700; color: var(--primary); }
  .stat-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }

  /* ─── ACERTO MODAL / PANEL ─── */
  .acerto-panel {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 22px;
    margin-top: 18px; box-shadow: var(--shadow-lg);
  }
  .acerto-panel h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; color: var(--text); }
  .acerto-linha { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px dashed var(--border); font-size: 14px; }
  .acerto-linha:last-child { border-bottom: none; }
  .acerto-linha .lbl { color: var(--text2); }
  .acerto-linha .val { font-weight: 600; color: var(--text); }
  .acerto-total { margin-top: 10px; background: var(--primary-light); border-radius: var(--radius); padding: 14px 16px; }
  .acerto-total .lbl { font-size: 14px; font-weight: 700; color: var(--primary); }
  .acerto-total .val { font-size: 20px; font-weight: 800; }
  .val-pos { color: var(--danger) !important; }
  .val-neg { color: #1a6b5a !important; }
  .val-zero { color: #555 !important; }

  /* ─── TOAST ─── */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px);
    background: var(--primary-dark); color: #fff;
    padding: 12px 22px; border-radius: 30px;
    font-size: 14px; font-weight: 600;
    box-shadow: var(--shadow-lg); z-index: 9999;
    transition: transform .3s cubic-bezier(.4,0,.2,1);
    white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }
  #toast.error { background: var(--danger); }

  /* ─── EMPTY STATE ─── */
  .empty { text-align: center; padding: 40px 20px; color: var(--text3); }
  .empty .eicon { font-size: 40px; margin-bottom: 10px; }
  .empty p { font-size: 14px; }

  /* ─── INLINE DELETE CONFIRM ─── */
  .row-del-confirm { background: var(--danger-light) !important; }

  /* ─── FILTROS ─── */
  .filter-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 18px; align-items: flex-end; }
  .filter-bar .form-group { margin: 0; min-width: 140px; }

  /* ─── RESPONSIVO ─── */
  @media (max-width: 768px) {
    .header-menu-btn { display: block; }
    nav#sidebar { transform: translateX(-100%); }
    nav#sidebar.open { transform: translateX(0); }
    main { margin-left: 0; padding: 16px 12px; }
    #appFooter { margin-left: 0 !important; padding: 8px 12px; flex-direction: column; gap: 4px; text-align: center; }
    #updateBadge { font-size: 9px !important; }
    .form-grid { grid-template-columns: 1fr; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .acerto-linha { flex-direction: column; align-items: flex-start; gap: 3px; }
    .acerto-total .val { font-size: 17px; }
  }
  @media (max-width: 480px) {
    .stats-grid { grid-template-columns: 1fr 1fr; }
    header .header-brand span { font-size: 15px; }
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="header-brand">
      <button class="header-menu-btn" id="menuBtn" onclick="toggleNav()">☰</button>

<script>
// ════════════════════════════════════════════════════════════
// STORAGE
// ════════════════════════════════════════════════════════════
const DB = {
  get(k){ try{return JSON.parse(localStorage.getItem('av_'+k))||[]}catch{return []} },
  set(k,v){ localStorage.setItem('av_'+k, JSON.stringify(v)) },
  getObj(k,def={}){ try{return JSON.parse(localStorage.getItem('av_'+k))||def}catch{return def} },
  setObj(k,v){ localStorage.setItem('av_'+k, JSON.stringify(v)) }
};

function genId(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6) }

// ════════════════════════════════════════════════════════════
// NAVIGATION
// ════════════════════════════════════════════════════════════
let currentPage = 'pessoas';
function navigate(page){
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el=>{
    el.classList.toggle('active', el.dataset.page===page);
  });
  if(window.innerWidth<=768) document.getElementById('sidebar').classList.remove('open');
  const renders = {pessoas:renderPessoas, grupos:renderGrupos, despesas:renderDespesas, acerto:renderAcerto, relatorio:renderRelatorio};
  renders[page]?.();
}
function toggleNav(){
  document.getElementById('sidebar').classList.toggle('open');
}

// ════════════════════════════════════════════════════════════
// TOAST
// ════════════════════════════════════════════════════════════
let _toastTimer;
function toast(msg, type='ok'){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = type==='error'?'error':'';
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(()=>el.classList.remove('show'), 3000);
}

// ════════════════════════════════════════════════════════════
// UTILS
// ════════════════════════════════════════════════════════════
function fmt(v){ return 'R$ '+parseFloat(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtDate(s){ if(!s)return '-'; const[y,m,d]=s.split('-'); return `${d}/${m}/${y}`; }
function today(){ return new Date().toISOString().slice(0,10); }
function sanitize(s){ return (s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ════════════════════════════════════════════════════════════
// PAGE: PESSOAS
// ════════════════════════════════════════════════════════════
function renderPessoas(){
  const pessoas = DB.get('pessoas');
  const html = `
  <div class="page-header"><h1>👤 Pessoas</h1><p>Cadastre as pessoas que podem realizar viagens.</p></div>
  <div class="card">
    <div class="card-title">➕ Nova Pessoa</div>
    <div class="form-grid">
      <div class="form-group"><label>Nome Completo *</label><input id="p_nome" placeholder="Ex: João Silva" maxlength="80"></div>
      <div class="form-group"><label>Departamento</label><input id="p_depto" placeholder="Ex: Comercial" maxlength="60"></div>
      <div class="form-group"><label>E-mail</label><input id="p_email" type="email" placeholder="joao@empresa.com" maxlength="80"></div>
      <div class="form-group"><label>Telefone</label><input id="p_fone" placeholder="(xx) xxxxx-xxxx" maxlength="20"></div>
    </div>
    <div class="form-actions" style="margin-top:14px">
      <button class="btn btn-primary" onclick="salvarPessoa()">💾 Salvar</button>
    </div>
  </div>
  <div class="card">
    <div class="card-title">👥 Pessoas Cadastradas (${pessoas.length})</div>
    ${pessoas.length===0?`<div class="empty"><div class="eicon">👤</div><p>Nenhuma pessoa cadastrada.</p></div>`:`
    <div class="table-wrap"><table>
      <thead><tr><th>Nome</th><th>Departamento</th><th>E-mail</th><th>Telefone</th><th style="text-align:right">Ações</th></tr></thead>
      <tbody>
        ${pessoas.map(p=>`<tr id="row-p-${p.id}">
          <td><strong>${sanitize(p.nome)}</strong></td>
          <td>${sanitize(p.depto)||'-'}</td>
          <td>${sanitize(p.email)||'-'}</td>
          <td>${sanitize(p.fone)||'-'}</td>
          <td><div class="td-actions">
            <button class="btn btn-ghost btn-sm btn-icon" onclick="editarPessoa('${p.id}')" title="Editar">✏️</button>
            <button class="btn btn-ghost btn-sm btn-icon" onclick="confirmarDelPessoa('${p.id}')" title="Excluir">🗑️</button>
          </div></td>
        </tr>`).join('')}
      </tbody>
    </table></div>`}

function salvarPessoa(){
  const nome = document.getElementById('p_nome').value.trim();
  if(!nome){ toast('Informe o nome','error'); return; }
  const depto = document.getElementById('p_depto').value.trim();
  const email = document.getElementById('p_email').value.trim();
  const fone  = document.getElementById('p_fone').value.trim();
  const editId = document.getElementById('p_nome').dataset.editId;
  const pessoas = DB.get('pessoas');
  if(editId){
    const idx = pessoas.findIndex(x=>x.id===editId);
    if(idx>-1) pessoas[idx]={...pessoas[idx],nome,depto,email,fone};
    delete document.getElementById('p_nome').dataset.editId;
    toast('Pessoa atualizada!');
  } else {
    pessoas.push({id:genId(),nome,depto,email,fone});
    toast('Pessoa cadastrada!');
  }
  DB.set('pessoas',pessoas);
  renderPessoas();
}

function editarPessoa(id){
  const p = DB.get('pessoas').find(x=>x.id===id);
  if(!p) return;
  document.getElementById('p_nome').value=p.nome;
  document.getElementById('p_depto').value=p.depto||'';
  document.getElementById('p_email').value=p.email||'';
  document.getElementById('p_fone').value=p.fone||'';
  document.getElementById('p_nome').dataset.editId=id;
  document.getElementById('p_nome').focus();

}

function confirmarDelPessoa(id){

  const usado = DB.get('despesas').some(d=>d.pessoaId===id);
  if(usado){ toast('Pessoa possui despesas. Exclua as despesas antes.','error'); return; }
  row.classList.add('row-del-confirm');
  row.cells[row.cells.length-1].innerHTML=`<div class="td-actions">
    <button class="btn btn-danger btn-sm" onclick="deletarPessoa('${id}')">Confirmar</button>

  </div>`;

function deletarPessoa(id){
  const p = DB.get('pessoas').filter(x=>x.id!==id);
  DB.set('pessoas',p);
  toast('Pessoa excluída!');
  renderPessoas();
}

function renderAcerto(){
  const pessoas = DB.get('pessoas');
  const despesas = DB.get('despesas');
  const grupos  = DB.get('grupos');

  const optPessoas = pessoas.map(p=>`<option value="${p.id}">${sanitize(p.nome)}</option>`).join('');
  const ac = DB.getObj('acertoState',{pessoaId:'',dtDe:'',dtAte:today(),adiantamento:'0'});

  // compute
  let result = null;
  if(ac.pessoaId){
    let lista = despesas.filter(d=>d.pessoaId===ac.pessoaId);
    if(ac.dtDe)  lista=lista.filter(d=>d.data>=ac.dtDe);
    if(ac.dtAte) lista=lista.filter(d=>d.data<=ac.dtAte);

    const totalGeral = lista.reduce((s,d)=>s+parseFloat(d.valor||0),0);
    const totalDinheiro = lista.filter(d=>d.pagto==='dinheiro').reduce((s,d)=>s+parseFloat(d.valor||0),0);
    const totalCartao = lista.filter(d=>d.pagto==='cartao').reduce((s,d)=>s+parseFloat(d.valor||0),0);
    const adiant = parseFloat(ac.adiantamento)||0;
    const saldo = totalDinheiro - adiant; // positivo = colaborador deve devolver; negativo = empresa deve ao colaborador

    // por grupo
    const porGrupo = {};
    lista.forEach(d=>{
      const g = grupos.find(x=>x.id===d.grupoId);
      const k = g ? g.nome : '—';
      porGrupo[k]=(porGrupo[k]||0)+parseFloat(d.valor||0);
    });

    result = {lista, totalGeral, totalDinheiro, totalCartao, adiant, saldo, porGrupo, pessoa: pessoas.find(x=>x.id===ac.pessoaId)};
  }

  const html = `
  <div class="page-header no-print" style="margin-bottom:10px"><h1>💰 Acerto de Contas</h1></div>
  <div class="card no-print" style="padding:10px 14px;margin-bottom:14px">
    <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:flex-end">
      <div style="display:flex;flex-direction:column;gap:3px;flex:2;min-width:150px">
        <label style="font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px">Colaborador</label>
        <select id="ac_pessoa" style="height:34px;font-size:13px;padding:0 8px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface2);color:var(--text)"><option value="">Selecione...</option>${optPessoas}</select>
      </div>
      <div style="display:flex;flex-direction:column;gap:3px;min-width:110px">
        <label style="font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px">De</label>
        <input type="date" id="ac_dtDe" value="${ac.dtDe||''}" style="height:34px;font-size:13px;padding:0 8px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface2);color:var(--text)">
      </div>
      <div style="display:flex;flex-direction:column;gap:3px;min-width:110px">
        <label style="font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px">Até</label>
        <input type="date" id="ac_dtAte" value="${ac.dtAte||today()}" style="height:34px;font-size:13px;padding:0 8px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface2);color:var(--text)">
      </div>
      <div style="display:flex;flex-direction:column;gap:3px;min-width:100px">
        <label style="font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px">Adiantamento R$</label>
        <input type="number" id="ac_adiant" step="0.01" min="0" placeholder="0,00" value="${ac.adiantamento||0}" style="height:34px;font-size:13px;padding:0 8px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface2);color:var(--text)">
      </div>
      <button class="btn btn-accent" onclick="calcularAcerto()" style="height:34px;padding:0 14px;font-size:13px;white-space:nowrap">🧮 Calcular</button>
      <button class="btn btn-ghost" onclick="limparAcerto()" style="height:34px;padding:0 10px;font-size:13px">✕</button>
    </div>
  </div>
  <div id="acertoResult">${result ? buildAcertoResult(result) : ''}</div>
  `;

  document.getElementById('main').innerHTML = html;
  document.getElementById('ac_pessoa').value = ac.pessoaId||'';
}

function updateAcerto(key,val){
  const ac = DB.getObj('acertoState');
  ac[key]=val;
  DB.setObj('acertoState',ac);
}

function calcularAcerto(){
  const ac = DB.getObj('acertoState');
  ac.pessoaId = document.getElementById('ac_pessoa').value;
  ac.dtDe = document.getElementById('ac_dtDe').value;
  ac.dtAte = document.getElementById('ac_dtAte').value;
  ac.adiantamento = document.getElementById('ac_adiant').value;
  DB.setObj('acertoState',ac);
  if(!ac.pessoaId){ toast('Selecione um colaborador','error'); return; }
  renderAcerto();
}

function limparAcerto(){
  DB.setObj('acertoState',{});
  renderAcerto();
}

function buildAcertoResult(r){
  const {lista,totalGeral,totalDinheiro,totalCartao,adiant,saldo,pessoa} = r;
  const ac = DB.getObj('acertoState');
  const saldoClass = saldo>0?'val-pos':saldo<0?'val-neg':'val-zero';
  const saldoLabel = saldo>0?'Colaborador deve devolver à empresa':saldo<0?'Empresa deve reembolsar o colaborador':'Quitado — sem pendências';
  const grupos = DB.get('grupos');

  const grupoMap = {};
  lista.forEach(d=>{
    const g = grupos.find(x=>x.id===d.grupoId);
    const k = d.grupoId||'__sem__';
    if(!grupoMap[k]) grupoMap[k]={id:k, nome:g?.nome||'(sem grupo)', cr:g?.cr||'—', total:0};
    grupoMap[k].total += parseFloat(d.valor||0);
  });
  const resumoGrupos = Object.values(grupoMap).sort((a,b)=>b.total-a.total);

  const periodoStr = (ac.dtDe||ac.dtAte)

function exportarAcertoCSV(){
  const ac = DB.getObj('acertoState');
  if(!ac.pessoaId) return;
  const pessoa = DB.get('pessoas').find(x=>x.id===ac.pessoaId);
  const grupos = DB.get('grupos');
  let lista = DB.get('despesas').filter(d=>d.pessoaId===ac.pessoaId);
  if(ac.dtDe)  lista=lista.filter(d=>d.data>=ac.dtDe);
  if(ac.dtAte) lista=lista.filter(d=>d.data<=ac.dtAte);
  lista.sort((a,b)=>a.data.localeCompare(b.data));
  const rows = [['Data','Fornecedor','Grupo','Centro Resultado','Pagamento','Observacao','Valor']];
  lista.forEach(d=>{
    const g=grupos.find(x=>x.id===d.grupoId);
    rows.push([d.data,d.forn,g?.nome||'',g?.cr||'',d.pagto,d.obs||'',d.valor]);
  });
  const csv = rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(';')).join('\n');
  const blob = new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`acerto_${pessoa?.nome.replace(/\s/g,'_')}_${ac.dtAte||today()}.csv`;
  a.click();
  toast('CSV exportado!');
}

function renderRelatorio(){

function filtrarRelatorio(){
  const fs = {};
  const de  = document.getElementById('rf_dtDe');
  const ate = document.getElementById('rf_dtAte');
  if(de)  fs.dtDe  = de.value;
  if(ate) fs.dtAte = ate.value;

  renderRelatorio();
}

function limparFiltroRelatorio(){
  DB.setObj('relatorioFilter', {});
  renderRelatorio();
}

function gerarPDF(){
  const btnEl = document.querySelector('[onclick="gerarPDF()"]');
  if(btnEl){ btnEl.disabled=true; btnEl.textContent='⏳ Gerando...'; }
  function restore(){ if(btnEl){btnEl.disabled=false;btnEl.textContent='📄 Gerar PDF';} }

  const panel = document.querySelector('.acerto-panel');
  if(!panel){ toast('Gere o acerto primeiro.','error'); restore(); return; }

  const ac   = DB.getObj('acertoState');
  const pess = DB.get('pessoas').find(x=>x.id===ac.pessoaId);
  const fname = 'acerto_'+(pess?.nome||'viagem').replace(/\s+/g,'_')+'_'+(ac.dtAte||today())+'.pdf';

  // 1. Cria um clone do painel em largura fixa A4 (794px = 210mm @ 96dpi)
  //    para garantir layout idêntico à impressão, independente do tamanho da tela
  const wrapper = document.createElement('div');
  wrapper.style.cssText = 'position:fixed;left:-9999px;top:0;width:794px;background:#fff;z-index:-1;';

  const clone = panel.cloneNode(true);

  // Remove botões no-print do clone
  clone.querySelectorAll('.no-print').forEach(el => el.remove());

  // Mostra barra verde com logo no clone
  const cloneBar = clone.querySelector('.print-header-bar');
  if(cloneBar) cloneBar.style.cssText = 'display:flex!important;background:#1a6b5a;color:#fff;padding:10px 18px;align-items:center;justify-content:space-between;margin-bottom:12px;';

  // Remove sombra/borda do painel clonado
  clone.style.cssText = 'box-shadow:none;border:none;padding:18px 22px;background:#fff;font-family:Segoe UI,system-ui,sans-serif;';

  // Estilos de impressão aplicados diretamente
  const styleTag = document.createElement('style');
  styleTag.textContent = `
    .pdf-clone table { font-size:13px!important; width:100%; border-collapse:collapse; }
    .pdf-clone thead th { background:#1a6b5a!important; color:#fff!important; padding:7px 10px!important; font-size:12px!important; font-weight:700; }
    .pdf-clone tbody tr { border-bottom:1px solid #dde3e0; }
    .pdf-clone tbody td { padding:6px 10px!important; font-size:13px!important; }
    .pdf-clone tfoot td { background:#e8f5f1!important; padding:7px 10px!important; font-size:13px!important; font-weight:700; }
    .pdf-clone .rp-saldo-box { background:#e8f5f1!important; border:1.5px solid #1a6b5a!important; }
    .pdf-clone .print-pessoa { border-bottom:2px solid #1a6b5a; padding-bottom:10px; margin-bottom:14px; display:flex; justify-content:space-between; flex-wrap:wrap; gap:6px; }
    .pdf-clone [style*="font-size:12px"] { font-size:13px!important; }
    .pdf-clone [style*="font-size:11px"] { font-size:13px!important; }
    .pdf-clone [style*="font-size:16px"] { font-size:16px!important; font-weight:700; }
    .pdf-clone .badge { font-size:12px!important; padding:2px 8px; border-radius:20px; }
    .pdf-clone .badge-dinheiro { background:#e8f5e9; color:#2e7d32; }
    .pdf-clone .badge-cartao   { background:#e3f2fd; color:#1565c0; }
  `;
  clone.classList.add('pdf-clone');
  wrapper.appendChild(styleTag);
  wrapper.appendChild(clone);
  document.body.appendChild(wrapper);

  // 2. Captura após render
  setTimeout(() => {
    html2canvas(wrapper, {
      scale: 2,
      useCORS: true,
      allowTaint: true,
      backgroundColor: '#ffffff',
      logging: false,
      width: 794,
      windowWidth: 794
    }).then(canvas => {

      document.body.removeChild(wrapper);

      // 3. Monta PDF A4
      const { jsPDF } = window.jspdf;
      const ML = 10, MR = 10, MT = 10;
      const pgW = 210, pgH = 297;
      const usableW = pgW - ML - MR;
      const usableH = pgH - MT - MT;
      const imgH = canvas.height * usableW / canvas.width;

      const doc = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });

      if(imgH <= usableH){
        doc.addImage(canvas.toDataURL('image/jpeg', 0.97), 'JPEG', ML, MT, usableW, imgH);
      } else {
        const pxPerMm = canvas.width / usableW;
        const slicePx = Math.floor(usableH * pxPerMm);
        let offsetPx = 0, first = true;
        while(offsetPx < canvas.height){
          const thisPx = Math.min(slicePx, canvas.height - offsetPx);
          const thisMm = thisPx / pxPerMm;
          const slice  = document.createElement('canvas');
          slice.width  = canvas.width;
          slice.height = thisPx;
          slice.getContext('2d').drawImage(canvas, 0, offsetPx, canvas.width, thisPx, 0, 0, canvas.width, thisPx);
          if(!first) doc.addPage();
          doc.addImage(slice.toDataURL('image/jpeg', 0.97), 'JPEG', ML, MT, usableW, thisMm);
          offsetPx += thisPx;
          first = false;
        }
      }

      doc.save(fname);
      restore();
      toast('PDF gerado! 📄');

    }).catch(err => {
      if(document.body.contains(wrapper)) document.body.removeChild(wrapper);
      restore();
      toast('Erro: '+err.message,'error');
      console.error('html2canvas error:', err);
    });
  }, 200);
}

<script>
if('serviceWorker' in navigator){
  const swCode = `
const VERSION = '1.0.0';
const CACHE   = 'acerto-viagem-v' + VERSION;
self.addEventListener('install', e => { self.skipWaiting(); });
self.addEventListener('activate', e => {
  e.waitUntil(
    caches.keys().then(keys =>
      Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))
    ).then(()=>clients.claim())
  );
});
self.addEventListener('fetch', e => {
  e.respondWith(fetch(e.request).catch(()=>caches.match(e.request)));
});
  `;
  const blob = new Blob([swCode], {type:'text/javascript'});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl, {scope:'/'})
    .then(reg=>{
      reg.addEventListener('updatefound', ()=>{
        const nw = reg.installing;
        nw.addEventListener('statechange', ()=>{
          if(nw.state==='installed' && navigator.serviceWorker.controller){
            const badge = document.getElementById('updateBadge');
            if(badge) badge.style.display='inline-block';
          }
        });
      });
    }).catch(()=>{});
}
</script>
